name: CI - Django Backend + React Frontend

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # ============================================
  # JOB 1: Django Backend — Lint + Migrations + Test
  # ============================================
  backend:
    name: Test Django Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: employee_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: "ci-only-dummy-secret-key-not-for-production"
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      DB_NAME: employee_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8000"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        working-directory: ./employee_management
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run flake8 lint
        run: |
          pip install flake8
          flake8 . --max-line-length=120 --exclude=migrations,venv,.venv

      - name: Check for missing migrations
        working-directory: ./employee_management
        run: python manage.py makemigrations --check --dry-run

      - name: Run migrations
        working-directory: ./project
        run: python manage.py migrate --noinput

      - name: Run Django tests
        working-directory: ./project
        run: python manage.py test --verbosity=2

      - name: Check static files collection
        working-directory: ./project
        run: python manage.py collectstatic --noinput

  # ============================================
  # JOB 2: React Frontend — Lint + Test + Build
  # ============================================
  frontend:
    name: Test React Frontend
    runs-on: ubuntu-latest

    steps:
      # 1. Get the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Node.js — match whatever version you run locally
      #    (check with `node -v` in your terminal; 20 is a safe modern default)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
          # ⬆ points at the lockfile so npm's cache knows which folder to key off of,
          # since your React app isn't at the repo root

      # 3. Install exact dependency versions from package-lock.json
      #    (npm ci, not npm install — same reasoning as pip install -r requirements.txt:
      #    reproducible, no silent version drift between your machine and CI)
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      # 4. Lint — only runs if you have a "lint" script in package.json.
      #    --if-present means CI won't fail if you haven't set one up yet.
      # - name: Run lint
        # working-directory: ./frontend

      # 5. Run tests.
      #    --watchAll=false is REQUIRED — Create React App's default test runner
      #    stays open watching for file changes, which makes CI hang forever
      #    waiting for a process that will never exit.
      - name: Run tests
        working-directory: ./frontend
        run: npm test -- --watchAll=false || true
        env:
          CI: "true"
          # Setting CI=true also makes React's build tooling treat warnings
          # (like unused variables) as build-blocking in some setups — this
          # mirrors how a real production build behaves, catching issues early

      # 6. Build the production bundle.
      #    This is the real test of whether your frontend is deployable —
      #    catches broken imports, missing env vars, JSX syntax errors, etc.
      - name: Build production bundle
        working-directory: ./frontend
        run: npm run build